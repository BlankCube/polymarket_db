<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; height: 100vh; }

/* Auth overlay */
#auth-overlay { position: fixed; inset: 0; background: #0a0a0f; display: flex; align-items: center; justify-content: center; z-index: 100; }
#auth-box { background: #12121a; border: 1px solid #2a2a3a; border-radius: 12px; padding: 32px; width: 360px; }
#auth-box h2 { color: #7c8aff; margin-bottom: 20px; font-size: 20px; }
#auth-box input { width: 100%; background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 14px; margin-bottom: 12px; outline: none; }
#auth-box input:focus { border-color: #7c8aff; }
#auth-box button { width: 100%; background: #7c8aff; color: #fff; border: none; border-radius: 8px; padding: 10px; font-size: 14px; cursor: pointer; font-weight: 600; margin-bottom: 8px; }
#auth-box button:hover { background: #6b79ee; }
#auth-box .secondary { background: transparent; border: 1px solid #2a2a3a; color: #888; }
#auth-box .secondary:hover { border-color: #7c8aff; color: #7c8aff; }
#auth-error { color: #ff6b6b; font-size: 13px; margin-bottom: 10px; display: none; }

/* Main layout */
#app { display: none; height: 100vh; }
.layout { display: flex; height: 100%; }

/* Sidebar */
.sidebar { width: 260px; background: #12121a; border-right: 1px solid #2a2a3a; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #2a2a3a; display: flex; justify-content: space-between; align-items: center; }
.sidebar-header h2 { font-size: 14px; color: #7c8aff; }
.new-chat-btn { background: #7c8aff; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
.new-chat-btn:hover { background: #6b79ee; }
.session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; font-size: 13px; color: #999; }
.session-item:hover { background: #1a1a28; color: #e0e0e0; }
.session-item.active { background: #1e1e3a; color: #7c8aff; border: 1px solid #2a2a5a; }
.session-item .topic { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-item .time { font-size: 11px; color: #555; margin-top: 2px; }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid #2a2a3a; font-size: 12px; color: #555; display: flex; justify-content: space-between; align-items: center; }
.logout-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 12px; }
.logout-btn:hover { color: #ff6b6b; }

/* Main area */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
header { padding: 12px 24px; background: #12121a; border-bottom: 1px solid #2a2a3a; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; color: #7c8aff; }
header span { font-size: 13px; color: #666; }

.chat-container { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 85%; padding: 14px 18px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
.msg.user { align-self: flex-end; background: #1e3a5f; color: #c8dff5; border-bottom-right-radius: 4px; }
.msg.ai { align-self: flex-start; background: #1a1a28; border: 1px solid #2a2a3a; border-bottom-left-radius: 4px; }
.msg.ai .text { white-space: pre-wrap; word-wrap: break-word; }
.sql-block { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; margin: 10px 0; font-family: 'Fira Code','Consolas',monospace; font-size: 13px; color: #79c0ff; overflow-x: auto; white-space: pre-wrap; }
.result-table-wrap { overflow-x: auto; margin: 10px 0; max-height: 400px; overflow-y: auto; }
table { border-collapse: collapse; width: 100%; font-size: 12px; }
th { background: #1a1a2e; color: #7c8aff; padding: 8px 12px; text-align: left; position: sticky; top: 0; border-bottom: 2px solid #2a2a3a; }
td { padding: 6px 12px; border-bottom: 1px solid #1e1e2e; }
tr:hover td { background: #15152a; }
tr:nth-child(even) td { background: #0f0f1a; }
.thinking { color: #666; font-style: italic; }
.error { background: #2a1515; border: 1px solid #5a2020; color: #ff8080; padding: 10px 14px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.row-count { font-size: 12px; color: #666; margin-top: 4px; }
.feedback-bar { display: flex; align-items: center; gap: 8px; padding: 10px 0; margin-top: 8px; border-top: 1px solid #2a2a3a; }
.feedback-bar span { font-size: 12px; color: #666; }
.feedback-bar button { background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 6px; padding: 4px 12px; font-size: 12px; color: #888; cursor: pointer; }
.feedback-bar button:hover { border-color: #7c8aff; color: #7c8aff; }
.feedback-bar button.selected { border-color: #7c8aff; color: #7c8aff; background: #1e1e3a; }
.feedback-input { display: none; margin-top: 6px; }
.feedback-input textarea { width: 100%; background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 6px; padding: 8px; color: #e0e0e0; font-size: 12px; resize: none; height: 60px; }
.feedback-input button { margin-top: 4px; background: #7c8aff; border: none; border-radius: 6px; padding: 4px 16px; font-size: 12px; color: #fff; cursor: pointer; }

.examples { padding: 16px 24px; display: flex; gap: 8px; flex-wrap: wrap; }
.example-chip { background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #888; cursor: pointer; transition: all 0.2s; }
.example-chip:hover { border-color: #7c8aff; color: #7c8aff; }

.input-area { padding: 16px 24px; background: #12121a; border-top: 1px solid #2a2a3a; display: flex; gap: 12px; }
.input-area textarea { flex: 1; background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; font-family: inherit; resize: none; height: 48px; outline: none; }
.input-area textarea:focus { border-color: #7c8aff; }
.input-area button { background: #7c8aff; color: #fff; border: none; border-radius: 8px; padding: 0 24px; font-size: 14px; cursor: pointer; font-weight: 600; }
.input-area button:hover { background: #6b79ee; }
.input-area button:disabled { background: #3a3a4a; cursor: not-allowed; }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-overlay">
  <div id="auth-box">
    <h2>Polymarket Explorer</h2>
    <div id="auth-error"></div>
    <input id="auth-user" type="text" placeholder="Username">
    <input id="auth-pass" type="password" placeholder="Password">
    <button onclick="doLogin()">Login</button>
    <button class="secondary" onclick="doRegister()">Create Account</button>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Sessions</h2>
        <button class="new-chat-btn" onclick="newSession()">+ New</button>
      </div>
      <div class="session-list" id="sessionList"></div>
      <div class="sidebar-footer">
        <span id="userDisplay"></span>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div class="main">
      <header>
        <h1>Polymarket Explorer</h1>
        <span>Natural language queries on prediction market data</span>
      </header>
      <div class="examples" id="examples">
        <div class="example-chip" onclick="askExample(this)">Show top 10 markets by volume</div>
        <div class="example-chip" onclick="askExample(this)">过了结算日期后还在0.99成交的交易</div>
        <div class="example-chip" onclick="askExample(this)">Biggest single trades over $100K</div>
        <div class="example-chip" onclick="askExample(this)">Most active traders by number of trades</div>
      </div>
      <div class="chat-container" id="chat"></div>
      <div class="input-area">
        <textarea id="input" placeholder="Ask anything about Polymarket trading data..." onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" onclick="send()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
// === State ===
let token = localStorage.getItem('pm_token');
let username = localStorage.getItem('pm_username');
let conversationHistory = [];
let isStreaming = false;
let sessionId = crypto.randomUUID();
let sessionStartedAt = new Date().toISOString();

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

// === Auth ===
function authHeaders() {
  return token ? { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

async function doLogin() {
  const u = document.getElementById('auth-user').value.trim();
  const p = document.getElementById('auth-pass').value;
  if (!u || !p) return;
  const resp = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:u, password:p}) });
  const data = await resp.json();
  if (data.status === 'ok') {
    token = data.token; username = data.username;
    localStorage.setItem('pm_token', token);
    localStorage.setItem('pm_username', username);
    enterApp();
  } else {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').textContent = data.message;
  }
}

async function doRegister() {
  const u = document.getElementById('auth-user').value.trim();
  const p = document.getElementById('auth-pass').value;
  if (!u || !p) return;
  const resp = await fetch('/api/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:u, password:p}) });
  const data = await resp.json();
  if (data.status === 'ok') {
    token = data.token; username = data.username;
    localStorage.setItem('pm_token', token);
    localStorage.setItem('pm_username', username);
    enterApp();
  } else {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').textContent = data.message;
  }
}

function doLogout() {
  saveSession();
  localStorage.removeItem('pm_token');
  localStorage.removeItem('pm_username');
  token = null; username = null;
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function enterApp() {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userDisplay').textContent = username;
  loadSessions();
}

// === Sessions ===
async function loadSessions() {
  const resp = await fetch('/api/sessions', { headers: authHeaders() });
  const data = await resp.json();
  const list = document.getElementById('sessionList');
  list.innerHTML = '';
  if (data.sessions) {
    data.sessions.forEach(s => {
      const div = document.createElement('div');
      div.className = 'session-item' + (s.session_id === sessionId ? ' active' : '');
      const topic = s.topic_summary || 'New conversation';
      const time = s.started_at ? new Date(s.started_at).toLocaleDateString() : '';
      div.innerHTML = `<div class="topic">${topic}</div><div class="time">${time}</div>`;
      div.onclick = () => resumeSession(s.session_id);
      list.appendChild(div);
    });
  }
}

function newSession() {
  saveSession();
  sessionId = crypto.randomUUID();
  sessionStartedAt = new Date().toISOString();
  conversationHistory = [];
  chat.innerHTML = '';
  document.getElementById('examples').style.display = 'flex';
  // Update sidebar active state
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
}

async function resumeSession(sid) {
  saveSession();
  const resp = await fetch(`/api/sessions/${sid}`, { headers: authHeaders() });
  const data = await resp.json();
  if (data.status !== 'ok') return;

  sessionId = data.session_id;
  sessionStartedAt = data.started_at || new Date().toISOString();
  conversationHistory = data.conversation || [];

  // Rebuild chat UI from conversation
  chat.innerHTML = '';
  document.getElementById('examples').style.display = 'none';
  conversationHistory.forEach(msg => {
    const div = document.createElement('div');
    div.className = `msg ${msg.role === 'user' ? 'user' : 'ai'}`;
    if (msg.role === 'user') {
      div.textContent = msg.content;
    } else {
      div.innerHTML = `<div class="text">${escapeHtml(msg.content)}</div>`;
    }
    chat.appendChild(div);
  });
  scrollBottom();

  // Update sidebar
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.session-item').forEach(el => {
    if (el.onclick.toString().includes(sid)) el.classList.add('active');
  });
  loadSessions();
}

function escapeHtml(t) {
  const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
}

function saveSession() {
  if (conversationHistory.length === 0) return;
  fetch('/api/end-session', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ session_id: sessionId, messages: conversationHistory, started_at: sessionStartedAt })
  }).catch(() => {});
}

// Save on leave
window.addEventListener('beforeunload', () => {
  if (conversationHistory.length > 0 && token) {
    const blob = new Blob([JSON.stringify({
      session_id: sessionId, messages: conversationHistory, started_at: sessionStartedAt
    })], {type: 'application/json'});
    navigator.sendBeacon('/api/end-session', blob);
  }
});
// Periodic save
setInterval(() => { if (token) saveSession(); }, 120000);

// === Chat ===
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function askExample(el) { input.value = el.textContent; send(); }
function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

function addMessage(role, content) {
  document.getElementById('examples').style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'ai') { div.innerHTML = '<div class="text"></div>'; }
  else { div.textContent = content; }
  chat.appendChild(div);
  scrollBottom();
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text || isStreaming) return;
  isStreaming = true; sendBtn.disabled = true; input.value = '';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const aiMsg = addMessage('ai', '');
  const textEl = aiMsg.querySelector('.text');
  textEl.innerHTML = '<span class="thinking">Thinking...</span>';

  let fullText = '', currentTable = null, rowCount = 0;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ messages: conversationHistory, session_id: sessionId }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', firstChunk = true, eventType = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('event: ')) { eventType = line.slice(7); }
        else if (line.startsWith('data: ') && eventType) {
          const data = JSON.parse(line.slice(6));
          if (firstChunk) { textEl.innerHTML = ''; firstChunk = false; }

          switch (eventType) {
            case 'text':
              fullText += data;
              textEl.textContent = fullText.replace(/<sql>[\s\S]*?<\/sql>/g,'').replace(/<python>[\s\S]*?<\/python>/g,'');
              scrollBottom(); break;
            case 'sql':
              const sb = document.createElement('div'); sb.className = 'sql-block'; sb.textContent = data;
              aiMsg.appendChild(sb); scrollBottom(); break;
            case 'python':
              const pb = document.createElement('div'); pb.className = 'sql-block'; pb.style.borderColor = '#2d6a4f';
              pb.textContent = '# Python\n' + data; aiMsg.appendChild(pb); scrollBottom(); break;
            case 'python_output':
              const ob = document.createElement('div'); ob.className = 'sql-block'; ob.style.borderColor = '#444'; ob.style.color = '#a0d0a0';
              ob.textContent = data; aiMsg.appendChild(ob); scrollBottom(); break;
            case 'columns':
              const wrap = document.createElement('div'); wrap.className = 'result-table-wrap';
              const tbl = document.createElement('table');
              const thead = document.createElement('thead'); const hr = document.createElement('tr');
              data.forEach(c => { const th = document.createElement('th'); th.textContent = c; hr.appendChild(th); });
              thead.appendChild(hr); tbl.appendChild(thead);
              const tbody = document.createElement('tbody'); tbl.appendChild(tbody);
              wrap.appendChild(tbl); aiMsg.appendChild(wrap);
              currentTable = tbody; rowCount = 0; scrollBottom(); break;
            case 'row':
              if (currentTable && rowCount < 200) {
                const tr = document.createElement('tr');
                data.forEach(v => { const td = document.createElement('td'); td.textContent = v === null ? 'NULL' : v; tr.appendChild(td); });
                currentTable.appendChild(tr); rowCount++;
              } break;
            case 'query_done':
              const cd = document.createElement('div'); cd.className = 'row-count';
              cd.textContent = `${data.row_count} rows returned`; aiMsg.appendChild(cd);
              currentTable = null; scrollBottom(); break;
            case 'error':
              const ed = document.createElement('div'); ed.className = 'error';
              ed.textContent = data.error; aiMsg.appendChild(ed); scrollBottom(); break;
          }
          eventType = null;
        }
      }
    }
  } catch (err) { textEl.textContent = 'Connection error: ' + err.message; }

  const cleanText = fullText.replace(/<sql>[\s\S]*?<\/sql>/g,'[SQL]').replace(/<python>[\s\S]*?<\/python>/g,'[Python]');
  if (cleanText.trim()) conversationHistory.push({ role: 'assistant', content: cleanText });
  if (conversationHistory.length > 40) conversationHistory = conversationHistory.slice(-40);

  // Feedback bar
  const fb = document.createElement('div'); fb.className = 'feedback-bar';
  fb.innerHTML = `<span>Helpful?</span>
    <button onclick="rate(this,'up')">👍</button><button onclick="rate(this,'down')">👎</button>
    <button onclick="showFB(this)">Feedback</button>`;
  aiMsg.appendChild(fb);

  isStreaming = false; sendBtn.disabled = false; input.focus();
  // Refresh session list after new messages
  if (token) setTimeout(loadSessions, 500);
}

function rate(btn, type) {
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  fetch('/api/feedback', { method:'POST', headers:authHeaders(), body:JSON.stringify({session_id:sessionId, rating:type==='up'?5:1}) });
}
function showFB(btn) {
  const bar = btn.parentElement;
  let fi = bar.nextElementSibling;
  if (fi && fi.className === 'feedback-input') { fi.style.display = fi.style.display === 'none' ? 'block' : 'none'; return; }
  fi = document.createElement('div'); fi.className = 'feedback-input'; fi.style.display = 'block';
  fi.innerHTML = `<textarea placeholder="What could be better?"></textarea><button onclick="submitFB(this)">Submit</button>`;
  bar.after(fi);
}
function submitFB(btn) {
  const t = btn.previousElementSibling.value; if (!t.trim()) return;
  fetch('/api/feedback', { method:'POST', headers:authHeaders(), body:JSON.stringify({session_id:sessionId, feedback:t}) });
  btn.parentElement.innerHTML = '<span style="color:#7c8aff;font-size:12px">Thanks!</span>';
}

// === Init ===
if (token) {
  fetch('/api/me', { headers: authHeaders() }).then(r => r.json()).then(d => {
    if (d.status === 'ok') { username = d.username; enterApp(); }
    else { doLogout(); }
  });
} else {
  document.getElementById('auth-overlay').style.display = 'flex';
}

// Enter key on auth
document.getElementById('auth-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
