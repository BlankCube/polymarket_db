<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

/* Auth overlay */
#auth-overlay { position: fixed; inset: 0; background: #0a0a0f; display: flex; align-items: center; justify-content: center; z-index: 100; }
#auth-overlay.hidden { display: none; }
#auth-box { background: #12121a; border: 1px solid #2a2a3a; border-radius: 12px; padding: 32px; width: 360px; }
#auth-box h2 { color: #7c8aff; margin-bottom: 20px; font-size: 20px; }
#auth-box input { width: 100%; background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 14px; margin-bottom: 12px; outline: none; }
#auth-box input:focus { border-color: #7c8aff; }
.auth-btn { width: 100%; background: #7c8aff; color: #fff; border: none; border-radius: 8px; padding: 10px; font-size: 14px; cursor: pointer; font-weight: 600; margin-bottom: 8px; }
.auth-btn:hover { background: #6b79ee; }
.auth-btn.secondary { background: transparent; border: 1px solid #2a2a3a; color: #888; }
.auth-btn.secondary:hover { border-color: #7c8aff; color: #7c8aff; }
#auth-error { color: #ff6b6b; font-size: 13px; margin-bottom: 10px; display: none; }

header { padding: 12px 24px; background: #12121a; border-bottom: 1px solid #2a2a3a; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; color: #7c8aff; }
header span { font-size: 13px; color: #666; flex: 1; }
.user-info { font-size: 12px; color: #888; display: flex; align-items: center; gap: 8px; }
.user-info button { background: none; border: none; color: #666; cursor: pointer; font-size: 12px; }
.user-info button:hover { color: #ff6b6b; }

.chat-container { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

.msg { max-width: 85%; padding: 14px 18px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
.msg.user { align-self: flex-end; background: #1e3a5f; color: #c8dff5; border-bottom-right-radius: 4px; }
.msg.ai { align-self: flex-start; background: #1a1a28; border: 1px solid #2a2a3a; border-bottom-left-radius: 4px; }
.msg.ai .text { white-space: pre-wrap; word-wrap: break-word; }

.sql-block { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; margin: 10px 0; font-family: 'Fira Code', 'Consolas', monospace; font-size: 13px; color: #79c0ff; overflow-x: auto; white-space: pre-wrap; }

.result-table-wrap { overflow-x: auto; margin: 10px 0; max-height: 400px; overflow-y: auto; }
table { border-collapse: collapse; width: 100%; font-size: 12px; }
th { background: #1a1a2e; color: #7c8aff; padding: 8px 12px; text-align: left; position: sticky; top: 0; border-bottom: 2px solid #2a2a3a; }
td { padding: 6px 12px; border-bottom: 1px solid #1e1e2e; }
tr:hover td { background: #15152a; }
tr:nth-child(even) td { background: #0f0f1a; }

.thinking { color: #666; font-style: italic; padding: 8px 0; }

.input-area { padding: 16px 24px; background: #12121a; border-top: 1px solid #2a2a3a; display: flex; gap: 12px; }
.input-area textarea { flex: 1; background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; font-family: inherit; resize: none; height: 48px; outline: none; }
.input-area textarea:focus { border-color: #7c8aff; }
.input-area button { background: #7c8aff; color: #fff; border: none; border-radius: 8px; padding: 0 24px; font-size: 14px; cursor: pointer; font-weight: 600; }
.input-area button:hover { background: #6b79ee; }
.input-area button:disabled { background: #3a3a4a; cursor: not-allowed; }

.examples { padding: 16px 24px; display: flex; gap: 8px; flex-wrap: wrap; }
.example-chip { background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #888; cursor: pointer; transition: all 0.2s; }
.example-chip:hover { border-color: #7c8aff; color: #7c8aff; }

.error { background: #2a1515; border: 1px solid #5a2020; color: #ff8080; padding: 10px 14px; border-radius: 8px; margin: 8px 0; font-size: 13px; }

.row-count { font-size: 12px; color: #666; margin-top: 4px; }

.feedback-bar { display: flex; align-items: center; gap: 8px; padding: 10px 0; margin-top: 8px; border-top: 1px solid #2a2a3a; }
.feedback-bar span { font-size: 12px; color: #666; }
.feedback-bar button { background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 6px; padding: 4px 12px; font-size: 12px; color: #888; cursor: pointer; }
.feedback-bar button:hover { border-color: #7c8aff; color: #7c8aff; }
.feedback-bar button.selected { border-color: #7c8aff; color: #7c8aff; background: #1e1e3a; }
.feedback-input { display: none; margin-top: 6px; }
.feedback-input textarea { width: 100%; background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 6px; padding: 8px; color: #e0e0e0; font-size: 12px; resize: none; height: 60px; }
.feedback-input button { margin-top: 4px; background: #7c8aff; border: none; border-radius: 6px; padding: 4px 16px; font-size: 12px; color: #fff; cursor: pointer; }

.session-list { padding: 8px 24px; display: flex; gap: 6px; overflow-x: auto; border-bottom: 1px solid #2a2a3a; background: #0d0d14; }
.session-tab { background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 6px; padding: 4px 12px; font-size: 11px; color: #888; cursor: pointer; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.session-tab:hover { border-color: #7c8aff; color: #7c8aff; }
.session-tab.active { border-color: #7c8aff; color: #7c8aff; background: #1e1e3a; }
.new-session-btn { background: none; border: 1px dashed #2a2a3a; border-radius: 6px; padding: 4px 12px; font-size: 11px; color: #555; cursor: pointer; flex-shrink: 0; }
.new-session-btn:hover { border-color: #7c8aff; color: #7c8aff; }
</style>
</head>
<body>

<!-- Auth overlay -->
<div id="auth-overlay">
  <div id="auth-box">
    <h2>Polymarket Explorer</h2>
    <div id="auth-error"></div>
    <input id="auth-user" type="text" placeholder="Username" onkeydown="if(event.key==='Enter')doLogin()">
    <input id="auth-pass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="auth-btn" onclick="doLogin()">Login</button>
    <button class="auth-btn secondary" onclick="doRegister()">Create Account</button>
  </div>
</div>

<header>
  <h1>Polymarket Explorer</h1>
  <span>Natural language queries on prediction market data</span>
  <div class="user-info" id="userInfo" style="display:none">
    <span id="userDisplay"></span>
    <button onclick="doLogout()">Logout</button>
  </div>
</header>

<div class="session-list" id="sessionBar" style="display:none">
  <button class="new-session-btn" onclick="newSession()">+ New</button>
</div>

<div class="examples">
  <div class="example-chip" onclick="askExample(this)">有人在结果已定后还高价买错了方向吗？亏了多少？</div>
  <div class="example-chip" onclick="askExample(this)">Trump大选市场里投入最多的地址，他最终赚了还是亏了？</div>
  <div class="example-chip" onclick="askExample(this)">What does the data say about buying at 0.99 after the event deadline?</div>
  <div class="example-chip" onclick="askExample(this)">哪个市场的结算结果最出人意料？</div>
</div>

<div class="chat-container" id="chat"></div>

<div class="input-area">
  <textarea id="input" placeholder="Ask anything about Polymarket trading data..." onkeydown="handleKey(event)"></textarea>
  <button id="sendBtn" onclick="send()">Send</button>
</div>

<script>
// === These are the exact same references as the working version ===
var chat = document.getElementById('chat');
var input = document.getElementById('input');
var sendBtn = document.getElementById('sendBtn');
var conversationHistory = [];
var isStreaming = false;
var sessionId = crypto.randomUUID();
var sessionStartedAt = new Date().toISOString();

// === Auth state ===
var token = localStorage.getItem('pm_token');
var username = localStorage.getItem('pm_username');

function authHeaders() {
  var h = {'Content-Type': 'application/json'};
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

async function doLogin() {
  var u = document.getElementById('auth-user').value.trim();
  var p = document.getElementById('auth-pass').value;
  if (!u || !p) return;
  var resp = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p})});
  var data = await resp.json();
  if (data.status === 'ok') {
    token = data.token; username = data.username;
    localStorage.setItem('pm_token', token);
    localStorage.setItem('pm_username', username);
    showApp();
  } else {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').textContent = data.message;
  }
}

async function doRegister() {
  var u = document.getElementById('auth-user').value.trim();
  var p = document.getElementById('auth-pass').value;
  if (!u || !p) return;
  var resp = await fetch('/api/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p})});
  var data = await resp.json();
  if (data.status === 'ok') {
    token = data.token; username = data.username;
    localStorage.setItem('pm_token', token);
    localStorage.setItem('pm_username', username);
    showApp();
  } else {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').textContent = data.message;
  }
}

function doLogout() {
  saveSessionNow();
  localStorage.removeItem('pm_token');
  localStorage.removeItem('pm_username');
  token = null; username = null;
  document.getElementById('auth-overlay').className = '';
  document.getElementById('userInfo').style.display = 'none';
  document.getElementById('sessionBar').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-overlay').className = 'hidden';
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('userDisplay').textContent = username;
  document.getElementById('sessionBar').style.display = 'flex';
  loadSessions();
}

// === Session management ===
async function loadSessions() {
  var resp = await fetch('/api/sessions', {headers: authHeaders()});
  var data = await resp.json();
  var bar = document.getElementById('sessionBar');
  bar.innerHTML = '<button class="new-session-btn" onclick="newSession()">+ New</button>';
  if (data.sessions) {
    data.sessions.forEach(function(s) {
      var tab = document.createElement('div');
      tab.className = 'session-tab' + (s.session_id === sessionId ? ' active' : '');
      tab.textContent = s.topic_summary || 'Untitled';
      tab.onclick = function() { resumeSession(s.session_id); };
      bar.appendChild(tab);
    });
  }
}

function newSession() {
  saveSessionNow();
  sessionId = crypto.randomUUID();
  sessionStartedAt = new Date().toISOString();
  conversationHistory = [];
  chat.innerHTML = '';
  loadSessions();
}

async function resumeSession(sid) {
  saveSessionNow();
  var resp = await fetch('/api/sessions/' + sid, {headers: authHeaders()});
  var data = await resp.json();
  if (data.status !== 'ok') return;
  sessionId = data.session_id;
  sessionStartedAt = data.started_at || new Date().toISOString();
  conversationHistory = data.conversation || [];
  // Rebuild chat
  chat.innerHTML = '';
  conversationHistory.forEach(function(msg) {
    var div = document.createElement('div');
    div.className = 'msg ' + (msg.role === 'user' ? 'user' : 'ai');
    if (msg.role === 'user') {
      div.textContent = msg.content;
    } else {
      var t = document.createElement('div');
      t.className = 'text';
      t.textContent = msg.content;
      div.appendChild(t);
    }
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
  loadSessions();
}

// Sessions are saved on every /api/chat call. sendBeacon is just a backup for the final AI response.
window.addEventListener('beforeunload', function() {
  if (conversationHistory.length > 0) {
    var uid = null;
    try { if (token) uid = JSON.parse(atob(token.split('.')[1])).user_id; } catch(e) {}
    var blob = new Blob([JSON.stringify({
      session_id: sessionId, messages: conversationHistory, user_id: uid
    })], {type: 'application/json'});
    navigator.sendBeacon('/api/end-session', blob);
  }
});

// === Chat functions (unchanged from working version) ===

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function askExample(el) {
  input.value = el.textContent;
  send();
}

function scrollBottom() {
  chat.scrollTop = chat.scrollHeight;
}

function addMessage(role, content) {
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'ai') {
    div.innerHTML = '<div class="text"></div>';
  } else {
    div.textContent = content;
  }
  chat.appendChild(div);
  scrollBottom();
  return div;
}

async function send() {
  var text = input.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  input.value = '';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  var aiMsg = addMessage('ai', '');
  var textEl = aiMsg.querySelector('.text');
  textEl.innerHTML = '<span class="thinking">Thinking...</span>';

  var fullText = '';
  var currentTable = null;
  var tableColumns = [];
  var rowCount = 0;

  try {
    var resp = await fetch('/api/chat', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ messages: conversationHistory, session_id: sessionId }),
    });

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var firstChunk = true;

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;

      buffer += decoder.decode(chunk.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop();

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.startsWith('event: ')) {
          var eventType = line.slice(7);
        } else if (line.startsWith('data: ') && eventType) {
          var data = JSON.parse(line.slice(6));

          if (firstChunk) {
            textEl.innerHTML = '';
            firstChunk = false;
          }

          if (eventType === 'text') {
            fullText += data;
            renderText(textEl, fullText);
            scrollBottom();
          } else if (eventType === 'sql') {
            var sqlBlock = document.createElement('div');
            sqlBlock.className = 'sql-block';
            sqlBlock.textContent = data;
            aiMsg.appendChild(sqlBlock);
            scrollBottom();
          } else if (eventType === 'python') {
            var pyBlock = document.createElement('div');
            pyBlock.className = 'sql-block';
            pyBlock.style.borderColor = '#2d6a4f';
            pyBlock.textContent = '# Python\n' + data;
            aiMsg.appendChild(pyBlock);
            scrollBottom();
          } else if (eventType === 'python_output') {
            var outBlock = document.createElement('div');
            outBlock.className = 'sql-block';
            outBlock.style.borderColor = '#444';
            outBlock.style.color = '#a0d0a0';
            outBlock.textContent = data;
            aiMsg.appendChild(outBlock);
            scrollBottom();
          } else if (eventType === 'columns') {
            tableColumns = data;
            var wrap = document.createElement('div');
            wrap.className = 'result-table-wrap';
            var table = document.createElement('table');
            var thead = document.createElement('thead');
            var headerRow = document.createElement('tr');
            data.forEach(function(col) {
              var th = document.createElement('th');
              th.textContent = col;
              headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);
            var tbody = document.createElement('tbody');
            table.appendChild(tbody);
            wrap.appendChild(table);
            aiMsg.appendChild(wrap);
            currentTable = tbody;
            rowCount = 0;
            scrollBottom();
          } else if (eventType === 'row') {
            if (currentTable && rowCount < 200) {
              var tr = document.createElement('tr');
              data.forEach(function(val) {
                var td = document.createElement('td');
                td.textContent = val === null ? 'NULL' : val;
                tr.appendChild(td);
              });
              currentTable.appendChild(tr);
              rowCount++;
            }
          } else if (eventType === 'query_done') {
            var countDiv = document.createElement('div');
            countDiv.className = 'row-count';
            countDiv.textContent = data.row_count + ' rows returned';
            aiMsg.appendChild(countDiv);
            currentTable = null;
            scrollBottom();
          } else if (eventType === 'error') {
            var errDiv = document.createElement('div');
            errDiv.className = 'error';
            errDiv.textContent = data.error;
            aiMsg.appendChild(errDiv);
            scrollBottom();
          }
          eventType = null;
        }
      }
    }
  } catch (err) {
    textEl.textContent = 'Connection error: ' + err.message;
  }

  // Clean text for history
  var cleanText = fullText.replace(/<sql>[\s\S]*?<\/sql>/g, '[SQL query executed]').replace(/<python>[\s\S]*?<\/python>/g, '[Python executed]');
  if (cleanText.trim()) {
    conversationHistory.push({ role: 'assistant', content: cleanText });
  }
  if (conversationHistory.length > 20) {
    conversationHistory = conversationHistory.slice(-20);
  }

  // Feedback bar
  var fb = document.createElement('div');
  fb.className = 'feedback-bar';
  fb.innerHTML = '<span>Helpful?</span><button onclick="rateFeedback(this,\'up\')">👍</button><button onclick="rateFeedback(this,\'down\')">👎</button><button onclick="showFeedbackInput(this)">Feedback</button>';
  aiMsg.appendChild(fb);

  isStreaming = false;
  sendBtn.disabled = false;
  input.focus();
}

function rateFeedback(btn, type) {
  btn.parentElement.querySelectorAll('button').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  fetch('/api/feedback', {method:'POST', headers:authHeaders(), body:JSON.stringify({session_id:sessionId, rating:type==='up'?5:1})});
}

function showFeedbackInput(btn) {
  var bar = btn.parentElement;
  var fi = bar.nextElementSibling;
  if (fi && fi.className === 'feedback-input') {
    fi.style.display = fi.style.display === 'none' ? 'block' : 'none';
    return;
  }
  fi = document.createElement('div');
  fi.className = 'feedback-input';
  fi.style.display = 'block';
  fi.innerHTML = '<textarea placeholder="What could be better?"></textarea><button onclick="submitFeedback(this)">Submit</button>';
  bar.after(fi);
}

function submitFeedback(btn) {
  var text = btn.previousElementSibling.value;
  if (!text.trim()) return;
  fetch('/api/feedback', {method:'POST', headers:authHeaders(), body:JSON.stringify({session_id:sessionId, feedback:text})});
  btn.parentElement.innerHTML = '<span style="color:#7c8aff;font-size:12px">Thanks!</span>';
}

function renderText(el, text) {
  var cleaned = text.replace(/<sql>[\s\S]*?<\/sql>/g, '').replace(/<python>[\s\S]*?<\/python>/g, '');
  el.textContent = cleaned;
}

// === Init ===
if (token) {
  fetch('/api/me', {headers: authHeaders()}).then(function(r){return r.json()}).then(function(d) {
    if (d.status === 'ok') { username = d.username; showApp(); }
    else { doLogout(); }
  });
} else {
  // Show auth overlay (already visible by default)
}
</script>
</body>
</html>
