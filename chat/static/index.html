<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Polymarket Explorer</title>
<link rel="stylesheet" href="/static/app.css?v=2026-04-17-5">
</head>
<body>

<!-- Auth overlay -->
<div id="auth" class="auth-overlay">
  <!--
    Fail-safe: onsubmit="return false" prevents the browser's default form
    submission even if app.js hasn't loaded or errored out. Without this,
    a stale/missing JS would let the browser GET-submit credentials into
    the URL (visible in history, referer, server logs). The real submit
    logic is wired in app.js via addEventListener("submit", ...).
  -->
  <form id="auth-form" class="auth-box" method="post" action="javascript:void(0)"
        onsubmit="return false" autocomplete="on">
    <h2>Polymarket Explorer</h2>
    <div id="auth-err" class="auth-err" role="alert"></div>
    <input id="auth-username" name="username" autocomplete="username" placeholder="Username" required>
    <input id="auth-password" name="password" type="password" autocomplete="current-password" placeholder="Password" required>
    <button type="submit" class="btn-primary" id="btn-login">Login</button>
    <button type="button" class="btn-ghost" id="btn-register">Create account</button>
  </form>
</div>

<!-- Sidebar (history) -->
<aside id="sidebar" class="sidebar" hidden>
  <header class="sidebar-top">
    <h2>History</h2>
    <button id="btn-new" class="btn-primary btn-small">+ New</button>
  </header>
  <div id="session-list" class="session-list"></div>
  <footer class="sidebar-bot">
    <span id="current-user"></span>
    <button id="btn-logout" class="btn-link">Logout</button>
  </footer>
</aside>

<!-- Mobile sidebar toggle -->
<button id="btn-menu" class="btn-menu" aria-label="Toggle history" hidden>☰</button>

<!-- Main chat area -->
<main id="main" class="main" hidden>
  <header class="topbar">
    <h1>Polymarket Explorer</h1>
    <span id="stage-indicator" class="stage-indicator" hidden></span>
  </header>

  <section id="examples" class="examples">
    <p class="examples-hint">
      不知道怎么问？点一个示例会把它填进输入框 —— 你可以改了再发。
      好问题通常包含 <strong>范围</strong>（哪些市场 / 哪段时间）、<strong>筛选条件</strong>（价格、成交量、地址等）、<strong>想要的指标</strong>（胜率 / ROI / 分布 / 排序）。
    </p>
    <div class="example-chips">
      <!-- Pattern: 具体市场 × 交易者画像 × 聚合 -->
      <button class="example-chip">2024 Trump/Harris 大选市场里，投入金额 Top 20 的地址，分别盈亏多少？</button>
      <!-- Pattern: 策略回测（时间窗口 + 价格阈值 + 分桶指标）-->
      <button class="example-chip">已结算市场里，end_date 之后以 ≥0.95 买入的交易，按价位每 0.01 分桶，统计胜率和净 ROI</button>
      <!-- Pattern: 时间窗口 × 排序 × 分布 -->
      <button class="example-chip">最近 30 天成交量 Top 20 市场，按类别分布（政治 / 体育 / 加密 / 其他）</button>
      <!-- Pattern: outlier detection（排序 + Top N + 上下文字段）-->
      <button class="example-chip">已结算市场里，结算前 24 小时最后成交价与实际结果差距最大的 20 个市场，附成交量和持续时间</button>
    </div>
  </section>

  <div id="chat" class="chat" aria-live="polite"></div>

  <form id="input-bar" class="input-bar" action="javascript:void(0)" onsubmit="return false">
    <textarea id="input" placeholder="Ask anything..." rows="1"
              aria-label="Your question"></textarea>
    <button type="submit" class="btn-primary" id="btn-send">Send</button>
    <button type="button" class="btn-ghost" id="btn-cancel" hidden>Cancel</button>
  </form>
</main>

<script src="/static/app.js?v=2026-04-17-5" defer></script>
</body>
</html>
